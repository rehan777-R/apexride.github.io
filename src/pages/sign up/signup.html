<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | ApexRide</title>
 <link rel="icon" type="image/png" href="../../../favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="min-h-screen bg-slate-100 flex flex-col">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center space-x-2">
            <img src="../../../favicon.png" alt="ApexRide Logo" class="h-10 w-auto rounded-full">
            <span class="text-2xl font-bold text-blue-700">ApexRide</span>
        </div>
        <div class="flex space-x-6 items-center">
          <a href="../../../index.html" class="text-gray-600 hover:text-blue-600 font-medium text-sm">Home</a>
          <a href="../about/about.html" class="text-gray-600 hover:text-blue-600 font-medium text-sm">About</a>
          <a href="../products/products.html" class="text-gray-600 hover:text-blue-600 font-medium text-sm">Products</a>
          <a href="../contact/contact.html" class="text-gray-600 hover:text-blue-600 font-medium text-sm">Contact</a>
          <a href="../sign in/signin.html" class="px-4 py-2 border border-blue-600 text-blue-600 rounded-lg hover:bg-blue-50 text-sm font-medium">Sign In</a>
          <a href="./signup.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium">Sign Up</a>
          <button id="themeToggleBtn" class="text-xl p-2 rounded-full hover:bg-gray-100 transition">🌓</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Card -->
  <div class="flex-1 flex items-center justify-center py-12 px-4">
    <div class="bg-white rounded-xl shadow-sm p-10 w-full max-w-md">

      <div class="text-center mb-8">
        <div class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-sm mx-auto mb-3">AR</div>
        <h1 class="text-2xl font-bold text-gray-800">Create Account</h1>
        <p class="text-gray-500 text-sm mt-1">Join ApexRide today!</p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
          <input type="text" placeholder="Enter your name"
            class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" placeholder="123@example.com"
            class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" placeholder="Min 8 characters" minlength="8"
            class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input type="password" placeholder="Repeat your password"
            class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg text-sm transition">
          Create Account
        </button>
      </div>

      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="../sign in/signin.html" class="text-blue-600 font-semibold hover:underline">Sign In</a>
      </p>

    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-10">
    <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center space-x-2">
        <img src="../../../favicon.png" alt="ApexRide Logo" class="h-8 w-auto rounded-full">
        <span class="text-lg font-bold text-white">ApexRide</span>
      </div>
      <div class="flex space-x-6 text-sm">
        <a href="../../../index.html" class="hover:text-white transition">Home</a>
        <a href="../about/about.html" class="hover:text-white transition">About</a>
        <a href="../products/products.html" class="hover:text-white transition">Products</a>
        <a href="../contact/contact.html" class="hover:text-white transition">Contact</a>
      </div>
    </div>
    <p class="text-center text-xs mt-6 text-gray-500">© 2026 ApexRide. All rights reserved.</p>
  </footer>
<script src="../../constants/themeconstants.js"></script>
</body>
</html>
