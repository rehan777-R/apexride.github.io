<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | ApexRide</title>
  <link rel="icon" type="image/png" href="../../../favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>

<body class="bg-slate-100">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center space-x-2">
            <img src="../../../favicon.png" alt="ApexRide Logo" class="h-10 w-auto rounded-full">
            <span class="text-2xl font-bold text-blue-700">ApexRide</span>
        </div>
        <div class="flex space-x-6 items-center">
          <a href="../../../index.html" class="text-gray-600 hover:text-blue-600 font-medium text-sm">Home</a>
          <a href="../about/about.html" class="text-gray-600 hover:text-blue-600 font-medium text-sm">About</a>
          <a href="../products/products.html" class="text-gray-600 hover:text-blue-600 font-medium text-sm">Products</a>
          <a href="./contact.html" class="text-blue-600 font-semibold text-sm border-b-2 border-blue-600 pb-0.5">Contact</a>
          <a id="navSignIn" href="../sign in/signin.html" class="px-4 py-2 border border-blue-600 text-blue-600 rounded-lg hover:bg-blue-50 text-sm font-medium">Sign In</a>
          <a id="navSignUp" href="../sign up/signup.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">Sign Up</a>
          <button id="themeToggleBtn" class="text-xl p-2 rounded-full hover:bg-gray-100 transition">🌓</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Contact Hero -->
  <section class="relative bg-gradient-to-r from-slate-900 via-blue-900 to-blue-700 text-white py-10 overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/60 via-transparent to-transparent"></div>
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="text-4xl font-bold mb-4">Get In Touch</h1>
      <p class="text-blue-100 text-base max-w-2xl mx-auto">
        Have a question about a product or your order? Send us a message and our team will get back to you shortly.
      </p>
    </div>
  </section>

  <!-- Contact Section -->
  <section class="py-8">
    <div class="max-w-lg mx-auto px-6">

      <div class="bg-white rounded-xl shadow-sm p-8">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
            <input type="text" placeholder="Enter your name"
              class="w-full p-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" placeholder="Enter your email"
              class="w-full p-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Age</label>
            <input type="number" placeholder="Enter your age"
              class="w-full p-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
            <textarea placeholder="Enter your message" rows="4"
              class="w-full p-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
          </div>
          <button type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition text-sm font-semibold">
            Send Message
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-10">
    <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center space-x-2">
        <img src="../../../favicon.png" alt="ApexRide Logo" class="h-8 w-auto rounded-full">
        <span class="text-lg font-bold text-white">ApexRide</span>
      </div>
      <div class="flex space-x-6 text-sm">
        <a href="../../../index.html" class="hover:text-white transition">Home</a>
        <a href="../about/about.html" class="hover:text-white transition">About</a>
        <a href="../products/products.html" class="hover:text-white transition">Products</a>
        <a href="../contact/contact.html" class="hover:text-white transition">Contact</a>
      </div>
    </div>
    <p class="text-center text-xs mt-6 text-gray-500">© 2026 ApexRide. All rights reserved.</p>
  </footer>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="../../constants/firebase-config.js"></script>
  <script src="../../constants/auth-nav.js"></script>
  <script src="../../constants/themeconstants.js"></script>
</body>
</html>
